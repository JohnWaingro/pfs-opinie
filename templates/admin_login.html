<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Print Flow Opinie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --grad: linear-gradient(135deg, #00b4d8, #0353a4); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 44px 40px;
      width: 320px;
    }
    .logo-wrap { text-align: center; margin-bottom: 32px; }
    .logo-wrap img { height: 32px; object-fit: contain; filter: brightness(0) invert(1); opacity: .9; }
    h1 { font-size: 16px; font-weight: 600; color: #9ca3af; text-align: center; margin-bottom: 28px; letter-spacing: .5px; text-transform: uppercase; }
    .flash {
      background: rgba(220,38,38,.15);
      border: 1px solid rgba(220,38,38,.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    input[type=password] {
      width: 100%;
      background: #1e1e2e;
      border: 1.5px solid #2a2a3e;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 15px;
      color: #e5e7eb;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .2s;
      font-family: inherit;
    }
    input[type=password]:focus { border-color: #00b4d8; }
    button {
      width: 100%;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(3,83,164,.3);
      transition: opacity .2s;
    }
    button:hover { opacity: .9; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap"><img src="/static/logo.png" alt="PFS"></div>
  <h1>Panel Admina</h1>
  {% with messages = get_flashed_messages() %}
    {% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="password" name="password" placeholder="Hasło" autofocus>
    <button type="submit">Zaloguj się</button>
  </form>
</div>
</body>
</html>
