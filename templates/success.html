<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dziekujemy! — Print Flow Solutions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue1: #00b4d8;
      --blue2: #0353a4;
      --grad: linear-gradient(135deg, var(--blue1), var(--blue2));
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,.08);
      padding: 56px 48px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .check {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 36px;
      box-shadow: 0 8px 24px rgba(3,83,164,.3);
      animation: pop .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop {
      from { transform: scale(.4); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    img.logo {
      height: 36px;
      object-fit: contain;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }
    p {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.65;
    }
    .divider {
      height: 1px;
      background: #f3f4f6;
      margin: 28px 0;
    }
    .back {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 10px;
      background: var(--grad);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(3,83,164,.25);
      transition: opacity .2s;
    }
    .back:hover { opacity: .88; }
  </style>
</head>
<body>
<div class="card">
  <img src="/static/logo.png" alt="Print Flow Solutions" class="logo">
  <div class="check">✓</div>
  <h1>Dziekujemy, {{ name }}!</h1>
  <p>Twoja opinia zostala przyjeta. Po krotkim przegladzeniu przez nasz zespol pojawi sie na stronie <strong>print-flow.com.pl</strong>.</p>
  <div class="divider"></div>
  <a class="back" href="/">Dodaj kolejna opinie</a>
</div>
</body>
</html>
